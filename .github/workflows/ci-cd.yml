
name: CI/CD - Gerenciador de Tarefas Acadêmicas

on:
  push:
    branches:
      - main
      - chore-add-pytest
      - ci-cd-github-actions
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  testes:
    name: Testes
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar pasta de artifacts
        run: mkdir -p artifacts

      - name: Executar testes unitários
        run: |
          PYTHONPATH=. pytest -v --junitxml=artifacts/test-report.xml

      - name: Salvar relatório de testes como artifact
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: artifacts/test-report.xml

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar pacote distribuível
        run: |
          mkdir -p dist
          zip -r dist/gerenciador-tarefas-academicas.zip main.py src tests README.md requirements.txt

      - name: Salvar pacote como artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacote-projeto
          path: dist/gerenciador-tarefas-academicas.zip

  notificacao:
    name: Notificação
    runs-on: ubuntu-latest
    needs: [testes, build]
    if: always()

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Executar script de notificação
        env:
          STATUS_TESTES: ${{ needs.testes.result }}
          STATUS_BUILD: ${{ needs.build.result }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: python notificar.py

      - name: Enviar notificação por e-mail
        env:
          STATUS_TESTES: ${{ needs.testes.result }}
          STATUS_BUILD: ${{ needs.build.result }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: python scripts/notificar.py

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [testes, build]
    if: github.ref == 'refs/heads/main' && needs.testes.result == 'success' && needs.build.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Gerar página estática
        run: |
          mkdir -p site
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Gerenciador de Tarefas Acadêmicas</title>
          </head>
          <body>
            <h1>Gerenciador de Tarefas Acadêmicas</h1>
            <p>Deploy automático realizado com GitHub Actions.</p>
            <p>Build e testes executados com sucesso antes da publicação.</p>
          </body>
          </html>
          EOF

      - name: Enviar artifact do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4