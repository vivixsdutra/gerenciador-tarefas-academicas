name: CI/CD - Gerenciador de Tarefas Acadêmicas

on:
  push:
    branches:
      - main
      - chore-add-pytest
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  testes:
    name: Testes
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar pastas de saída
        run: |
          mkdir -p artifacts
          mkdir -p site

      - name: Executar testes unitários
        run: |
          PYTHONPATH=. pytest -v \
            --junitxml=artifacts/test-report.xml \
            --html=site/test-report.html \
            --self-contained-html \
            --css=site/pytest-theme.css

      - name: Salvar relatório XML como artifact
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes-xml
          path: artifacts/test-report.xml

      - name: Salvar relatório HTML como artifact
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes-html
          path: site/test-report.html

      - name: Enviar artifact do GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar pacote distribuível
        run: |
          mkdir -p dist
          zip -r dist/gerenciador-tarefas-academicas.zip main.py src tests README.md requirements.txt scripts site

      - name: Salvar pacote como artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacote-projeto
          path: dist/gerenciador-tarefas-academicas.zip

  notificacao:
    name: Notificação por e-mail
    runs-on: ubuntu-latest
    needs: [testes, build]
    if: always()

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Exibir resultado do pipeline
        run: |
          echo "===== RESULTADO DO PIPELINE ====="
          echo "Testes: ${{ needs.testes.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ needs.testes.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "Pipeline falhou"
          else
            echo "Pipeline executado com sucesso"
          fi

      - name: Enviar notificação por e-mail
        env:
          STATUS_TESTES: ${{ needs.testes.result }}
          STATUS_BUILD: ${{ needs.build.result }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: python scripts/notificar.py

  deploy_pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [testes, build]
    if: github.ref == 'refs/heads/main' && needs.testes.result == 'success' && needs.build.result == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Deploy GitHub Releases
    runs-on: ubuntu-latest
    needs: [testes, build]
    if: github.ref == 'refs/heads/main' && needs.testes.result == 'success' && needs.build.result == 'success'

    steps:
      - name: Baixar artifact do pacote
        uses: actions/download-artifact@v4
        with:
          name: pacote-projeto
          path: dist

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Release automática gerada pelo pipeline CI/CD.

            Resultados:
            - Testes: ${{ needs.testes.result }}
            - Build: ${{ needs.build.result }}

            Execução:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: dist/gerenciador-tarefas-academicas.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}